services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lmpanel-backend
    environment:
      # Listen on 8000 inside the container; host port is mapped in `ports` below.
      APP_PORT: "8000"
      APP_EXTERNAL_PORT: "${BACKEND_PORT:-8444}"
      FRONTEND_ORIGIN: "https://localhost:${FRONTEND_PORT:-8443}"
      INFERENCE_SERVICE_URL: http://inference:8100
      INFERENCE_RUNTIME_URLS: cpu=http://inference:8100,vulkan=http://inference:8100
      SUPPORTED_DEVICES: ""
      LLAMA_STARTUP_TIMEOUT_SECONDS: ${LLAMA_STARTUP_TIMEOUT_SECONDS:-600}
      LLAMA_HEALTH_TIMEOUT_SECONDS: ${LLAMA_HEALTH_TIMEOUT_SECONDS:-30}
      INFERENCE_SERVICE_TIMEOUT_SECONDS: ${INFERENCE_SERVICE_TIMEOUT_SECONDS:-600}
      OPENAI_API_AUTH_REQUIRED: ${OPENAI_API_AUTH_REQUIRED:-true}
      OPENAI_MODELS_AUTH_REQUIRED: ${OPENAI_MODELS_AUTH_REQUIRED:-false}
      VITE_APP_VERSION: ${VITE_APP_VERSION:-}
      VITE_APP_GIT_COMMIT: ${VITE_APP_GIT_COMMIT:-}
    volumes:
      - ./models:/app/models
      - lmpanel-data:/app/data
      - ./logs:/app/logs
      - ./certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - build-info:/app/shared
    ports:
      - "${BACKEND_PORT:-8444}:8000"
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8000/health"]
      interval: ${STARTUP_HEALTHCHECK_INTERVAL:-15s}
      timeout: ${STARTUP_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${STARTUP_HEALTHCHECK_RETRIES:-40}
      start_period: ${STARTUP_HEALTHCHECK_START_PERIOD:-300s}
    depends_on:
      inference:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        GIT_COMMIT: ${VITE_APP_GIT_COMMIT:-}
        APP_VERSION: ${VITE_APP_VERSION:-}
    container_name: lmpanel-frontend
    ports:
      - "${FRONTEND_PORT:-8443}:443"
    volumes:
      - ./certs:/etc/nginx/certs
      - build-info:/shared
    depends_on:
      backend:
        condition: service_healthy

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference.cpu
      args:
        LLAMA_CPP_TAG: ${LLAMA_CPP_TAG:-}
    container_name: lmpanel-inference
    environment:
      SUPPORTED_DEVICES: cpu,vulkan
      LLAMA_SERVER_PATH: /opt/llama.cpp/build/bin/llama-server
      LLAMA_STARTUP_TIMEOUT_SECONDS: ${LLAMA_STARTUP_TIMEOUT_SECONDS:-600}
      LLAMA_HEALTH_TIMEOUT_SECONDS: ${LLAMA_HEALTH_TIMEOUT_SECONDS:-30}
      LLAMA_FIT_TO_VRAM: ${LLAMA_FIT_TO_VRAM:-false}
      RADV_PERFTEST: ${RADV_PERFTEST:-nogttspill}
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - /dev/dri:/dev/dri
    device_cgroup_rules:
      - 'c 226:* rwm'
    group_add:
      - video
      - render
    cap_add:
      - PERFMON
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: ${STARTUP_HEALTHCHECK_INTERVAL:-15s}
      timeout: ${STARTUP_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${STARTUP_HEALTHCHECK_RETRIES:-40}
      start_period: ${STARTUP_HEALTHCHECK_START_PERIOD:-300s}

volumes:
  lmpanel-data:
  build-info:
