# Template for NVIDIA GPU passthrough. Copied to docker-compose.override.yml by scripts/configure-gpu-compose.sh
# Driver libraries and Vulkan ICD are injected by the NVIDIA Container Toolkit (runtime: nvidia + graphics).
services:
  inference:
    runtime: nvidia
    gpus:
      - count: all
        capabilities: [gpu, graphics]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
