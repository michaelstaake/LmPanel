# Template for NVIDIA GPU passthrough. Copied to docker-compose.override.yml by scripts/configure-gpu-compose.sh
# Host Vulkan ICD + NVIDIA GL libraries are appended to volumes by the configure script.
services:
  inference:
    runtime: nvidia
    gpus:
      - count: all
        capabilities: [gpu, graphics]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
