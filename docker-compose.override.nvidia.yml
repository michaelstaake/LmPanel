# Template for NVIDIA GPU passthrough. Copied to docker-compose.override.yml by scripts/configure-gpu-compose.sh
# Driver libraries and Vulkan ICD are injected by the NVIDIA Container Toolkit (runtime: nvidia + graphics).
# /dev/dri remains required for AMD and Intel GPUs in mixed-vendor hosts.
services:
  inference:
    runtime: nvidia
    gpus:
      - count: all
        capabilities: [gpu, graphics]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - /dev/dri:/dev/dri
    device_cgroup_rules:
      - 'c 226:* rwm'
    group_add:
      - video
      - render
