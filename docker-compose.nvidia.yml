# Deprecated: use scripts/configure-gpu-compose.sh instead.
# That script writes docker-compose.override.yml, which Compose merges automatically.
# This file is kept for backward compatibility only:
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d --build
services:
  inference:
    gpus: all
    environment:
      NVIDIA_DRIVER_CAPABILITIES: graphics,compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
